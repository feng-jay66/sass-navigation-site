services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: sass-frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sass-backend
    environment:
      JWT_SECRET: change-this-in-production
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped

  nginx:
    image: nginx:1.28.0-alpine
    container_name: sass-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx-compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/app/backend/uploads:ro
    restart: unless-stopped
